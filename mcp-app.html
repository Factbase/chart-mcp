<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factbase Charts</title>
  <link rel="stylesheet" href="./src/global.css" />
  <link rel="stylesheet" href="./src/mcp-app.css" />
</head>
<body>
  <div id="app">
    <div id="loading">Waiting for chart data...</div>
    <div id="chart-container" class="chart-container" style="display:none"></div>
    <div id="dashboard-container" class="dashboard-container" style="display:none">
      <h2 id="dashboard-title" class="dashboard-title"></h2>
      <div id="dashboard-grid" class="dashboard-grid"></div>
    </div>
  </div>

  <!-- One self-contained chart artifact: insight + name + toolbar + canvas + source.
       Cloned for the single-chart view and for every dashboard cell. -->
  <template id="chart-card-template">
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-heading">
          <div class="chart-insight"></div>
          <div class="chart-name"></div>
        </div>
        <div class="chart-toolbar-actions">
          <button class="chart-toolbar-btn btn-colors" data-tooltip="Colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7C3 5.11438 3 4.17157 3.58579 3.58579C4.17157 3 5.11438 3 7 3C8.88562 3 9.82843 3 10.4142 3.58579C11 4.17157 11 5.11438 11 7V12V17C11 18.8856 11 19.8284 10.4142 20.4142C9.82843 21 8.88562 21 7 21C5.11438 21 4.17157 21 3.58579 20.4142C3 19.8284 3 18.8856 3 17V12V7Z"/>
              <path d="M11 7.5L12.6716 5.82843C14.0049 4.49509 14.6716 3.82843 15.5 3.82843C16.3284 3.82843 16.9951 4.49509 18.3284 5.82843L19.1716 6.67157C20.5049 8.00491 21.1716 8.67157 21.1716 9.5C21.1716 10.3284 20.5049 10.9951 19.1716 12.3284L11 20.5"/>
              <path d="M7 21L17 21C18.8856 21 19.8284 21 20.4142 20.4142C21 19.8284 21 18.8856 21 17L21 15.5C21 15.0353 21 14.803 20.9616 14.6098C20.8038 13.8164 20.1836 13.1962 19.3902 13.0384C19.197 13 18.9647 13 18.5 13"/>
              <path d="M7 17.01L7 17"/>
            </svg>
          </button>
          <button class="chart-toolbar-btn btn-copy" data-tooltip="Copy CSV">
            <svg class="icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19.688 5.69833C20.3342 6.28473 20.6573 6.57793 20.8287 6.96478C21 7.35163 21 7.78795 21 8.66058L21 13C21 14.8856 21 15.8284 20.4142 16.4142C19.8284 17 18.8856 17 17 17H13C11.1144 17 10.1716 17 9.58579 16.4142C9 15.8284 9 14.8856 9 13L9 7C9 5.11438 9 4.17157 9.58579 3.58579C10.1716 3 11.1144 3 13 3H15.17C15.9332 3 16.3148 3 16.6625 3.13422C17.0101 3.26845 17.2927 3.52488 17.8579 4.03776L19.688 5.69833Z"/>
              <path d="M9 7L7 7C5.11438 7 4.17157 7 3.58579 7.58579C3 8.17157 3 9.11438 3 11L3 17C3 18.8856 3 19.8284 3.58579 20.4142C4.17157 21 5.11438 21 7 21H11C12.8856 21 13.8284 21 14.4142 20.4142C15 19.8284 15 18.8856 15 17V17"/>
            </svg>
            <svg class="icon-check" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M3 8.5l3 3 7-7"/>
            </svg>
          </button>
          <button class="chart-toolbar-btn btn-download" data-tooltip="Copy image">
            <svg class="icon-image" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8.976C3 4.05476 4.05476 3 8.976 3H15.024C19.9452 3 21 4.05476 21 8.976V15.024C21 19.9452 19.9452 21 15.024 21H8.976C4.05476 21 3 19.9452 3 15.024V8.976Z"/>
              <path d="M17.0045 16.5022L12.7279 12.2256C9.24808 8.74578 7.75642 8.74578 4.27658 12.2256L3 13.5022"/>
              <path d="M21.0002 13.6702C18.907 12.0667 17.478 12.2919 15.1982 14.3459"/>
              <path d="M17 8C17 8.55228 16.5523 9 16 9C15.4477 9 15 8.55228 15 8C15 7.44772 15.4477 7 16 7C16.5523 7 17 7.44772 17 8Z"/>
            </svg>
            <svg class="icon-check" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M3 8.5l3 3 7-7"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="chart-canvas-wrap"><canvas></canvas></div>
      <div class="chart-source"></div>
      <div class="color-popover" style="display:none"></div>
    </div>
  </template>

  <script type="module" src="./src/mcp-app.ts"></script>
</body>
</html>
